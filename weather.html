<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Weather API</title>
	</head>
	<body>
        <h1>Async Weather Tracker</h1>
        <div class="left-container">
            <div id ="search-main-container">
                <form id="search-form" action="">
                    <label for="city-input">Search City :</label>
                    <input type="text" id="city-input" placeholder="Enter city name">
                    <button type="submit">Search</button>
            </div>
            <div id ="history-main-container">
                <h4> Search History :</h4>
                <div id="history-container">
                    <button>Delhi</button>
                    <button>Banglore</button>
                </div>
                
            </div>
        </div>
        <div class="right-container">
            <h4> Weather Info</h4>
            <div id="weather-info-container">
            </div>
        </div>

        <script>
            const API_KEY = "1a761d3bb408836cd1af3641ce1604c9"
            let form = document.getElementById("search-form");
            let city = document.querySelector("#city-input");

            async function fetchWeather(city){
                let result = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}`)
                let data = await result.json();
                console.log(data);
                let card = document.createElement("div");
                card.innerHTML = `
                    <h4> City : ${data.name}</h4>
                    <p>Temperature : ${data.main.temp} K</p>
                    <p>Humidity : ${data.main.humidity} %</p>
                    <p>Wind Speed : ${data.wind.speed} m/s</p>
                `
                weatherInfoContainer.innerHTML = "";
                document.getElementById("weather-info-container").appendChild(card);
                
            }

            form.addEventListener("submit", (event)=>{
                event.preventDefault();
                fetchWeather(city.value);
            })
            
        </script>
    </body>
		
	
</html>
